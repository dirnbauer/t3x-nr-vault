name: CI
on:
  push:
  pull_request:
permissions: {}
jobs:
  ci:
    uses: netresearch/typo3-ci-workflows/.github/workflows/ci.yml@main
    permissions:
      contents: read
    with:
      php-versions: '["8.5"]'
      typo3-versions: '["^14.0"]'
      typo3-packages: '["typo3/cms-core", "typo3/cms-backend"]'
      php-extensions: intl, mbstring, xml, sodium, json
      cgl-command: composer lint
      phpstan-command: composer stan -- --error-format=github
      rector-command: composer exec -- rector process --dry-run
      unit-test-command: composer test:unit
      run-functional-tests: true
      functional-test-command: composer test:functional
