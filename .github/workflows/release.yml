name: Release

on:
  push:
    tags:
      - 'v*'

# Restrict default permissions - jobs declare what they need
permissions: {}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # 2.36.0
        with:
          php-version: '8.5'
          extensions: sodium, json
          tools: composer:v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Install dependencies
        run: composer install --no-dev --no-progress --prefer-dist --optimize-autoloader

      - name: Create release archive
        run: |
          # Create clean archive without dev files
          mkdir -p dist
          tar --exclude='.git' \
              --exclude='.github' \
              --exclude='.ddev' \
              --exclude='.Build' \
              --exclude='Tests' \
              --exclude='dist' \
              --exclude='.php-cs-fixer.dist.php' \
              --exclude='phpstan.neon' \
              --exclude='phpstan-baseline.neon' \
              --exclude='phpat.neon' \
              --exclude='infection.json5' \
              --exclude='rector.php' \
              -czvf dist/nr-vault-${{ steps.version.outputs.version }}.tar.gz .

          # Create zip as well
          zip -r dist/nr-vault-${{ steps.version.outputs.version }}.zip . \
              -x '.git/*' \
              -x '.github/*' \
              -x '.ddev/*' \
              -x '.Build/*' \
              -x 'Tests/*' \
              -x 'dist/*' \
              -x '.php-cs-fixer.dist.php' \
              -x 'phpstan.neon' \
              -x 'phpstan-baseline.neon' \
              -x 'phpat.neon' \
              -x 'infection.json5' \
              -x 'rector.php'

      - name: Generate SBOM
        uses: anchore/sbom-action@62ad5284b8ced813296287a0b63906cb364b73ee # v0.22.0
        with:
          artifact-name: sbom-${{ steps.version.outputs.version }}.spdx.json
          output-file: dist/sbom-${{ steps.version.outputs.version }}.spdx.json
          format: spdx-json

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums-${{ steps.version.outputs.version }}.txt

      - name: Sign artifacts with Cosign (keyless)
        run: |
          cd dist
          for file in *.tar.gz *.zip *.spdx.json checksums-*.txt; do
            cosign sign-blob --yes "$file" --bundle "${file}.bundle"
          done

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@00014ed6ed5efc5b1ab7f7f34a39eb55d41aa4f8 # v3.1.0
        with:
          subject-path: dist/nr-vault-${{ steps.version.outputs.version }}.tar.gz

      - name: Generate build provenance attestation (zip)
        uses: actions/attest-build-provenance@00014ed6ed5efc5b1ab7f7f34a39eb55d41aa4f8 # v3.1.0
        with:
          subject-path: dist/nr-vault-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.spdx.json
            dist/checksums-*.txt
            dist/*.bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ter:
    name: Upload to TER
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ !contains(github.ref_name, '-') }}  # Skip pre-releases (e.g., v0.1.0-beta)

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # 2.36.0
        with:
          php-version: '8.2'

      - name: Install tailor
        run: composer global require typo3/tailor --no-progress

      - name: Upload to TER
        env:
          TYPO3_API_TOKEN: ${{ secrets.TYPO3_TER_ACCESS_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          # Remove dev files before packaging (tailor will create the archive)
          rm -rf .git .github Tests Build .Build .ddev .php-cs-fixer* phpstan* phpunit* grumphp* rector* infection* Makefile *.dist
          # Strip 'v' prefix from version for TER
          TER_VERSION="${VERSION#v}"
          # Publish to TER (tailor creates the package from current directory)
          ~/.composer/vendor/bin/tailor ter:publish "$TER_VERSION" \
            --comment="Release $VERSION"
