name: SLSA Provenance

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

# Restrict default permissions - jobs declare what they need
permissions: {}

jobs:
  provenance:
    name: Generate SLSA Provenance
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v')
    permissions:
      actions: read
      id-token: write
      contents: write
    outputs:
      subjects: ${{ steps.subjects.outputs.subjects }}
      has_subjects: ${{ steps.subjects.outputs.has_subjects }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
        with:
          egress-policy: audit

      - name: Get version from triggering workflow
        id: version
        run: |
          VERSION="${{ github.event.workflow_run.head_branch }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Processing release: $VERSION"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          # Wait a moment for release to be fully available
          sleep 5
          gh release download "${{ steps.version.outputs.version }}" \
            --repo "${{ github.repository }}" \
            -D release-assets \
            --pattern "*.tar.gz" \
            --pattern "*.zip" || echo "Some assets may not be available"
          ls -la release-assets/

      - name: Generate provenance subjects
        id: subjects
        run: |
          cd release-assets
          if ls *.tar.gz *.zip 1> /dev/null 2>&1; then
            sha256sum *.tar.gz *.zip > ../provenance-subjects.txt
            cat ../provenance-subjects.txt
            SUBJECTS=$(cat ../provenance-subjects.txt | awk '{print "{\"name\":\""$2"\",\"digest\":{\"sha256\":\""$1"\"}}"}' | jq -s -c '.')
            SUBJECTS_BASE64=$(echo "$SUBJECTS" | base64 -w0)
            echo "subjects=$SUBJECTS_BASE64" >> "$GITHUB_OUTPUT"
            echo "has_subjects=true" >> "$GITHUB_OUTPUT"
          else
            echo "No release archives found"
            echo "has_subjects=false" >> "$GITHUB_OUTPUT"
          fi

  slsa-provenance:
    name: SLSA Level 3 Provenance
    needs: provenance
    if: needs.provenance.outputs.has_subjects == 'true'
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.provenance.outputs.subjects }}
      upload-assets: true
      upload-tag-name: ${{ needs.provenance.outputs.version }}
