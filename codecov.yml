# Codecov configuration
# https://docs.codecov.com/docs/codecovyml-reference

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: true
    patch:
      default:
        target: 80%
        threshold: 5%
        informational: true

# Branch / path coverage for PHP is derived from Clover XML automatically by
# Codecov — no parser tweaks needed. (The legacy `parsers.gcov.*` block only
# applies to C/C++ coverage sources and is ignored for PHP uploads.)

flags:
  unit:
    paths:
      - Classes/
    carryforward: true
  functional:
    paths:
      - Classes/
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

ignore:
  - "Tests/**/*"
  - ".Build/**/*"
  - ".ddev/**/*"
