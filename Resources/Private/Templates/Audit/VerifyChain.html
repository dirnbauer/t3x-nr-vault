<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Before">
    <f:be.pageRenderer includeCssFiles="{0: 'EXT:nr_vault/Resources/Public/Css/backend.css'}" />
</f:section>

<f:section name="Content">
    <div class="vault-module" role="main" aria-label="Hash Chain Verification">
        <f:if condition="{valid}">
            <f:then>
                <div class="callout callout-success" role="alert">
                    <div class="media">
                        <div class="media-left" aria-hidden="true">
                            <core:icon identifier="actions-check" size="small" />
                        </div>
                        <div class="media-body">
                            <h4 class="callout-title">
                                <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.chain_valid" />
                            </h4>
                            <p class="callout-body">
                                The audit log hash chain has been verified successfully. No tampering or modifications have been detected.
                            </p>
                        </div>
                    </div>
                </div>
            </f:then>
            <f:else>
                <div class="callout callout-danger" role="alert">
                    <div class="media">
                        <div class="media-left" aria-hidden="true">
                            <core:icon identifier="actions-exclamation-triangle" size="small" />
                        </div>
                        <div class="media-body">
                            <h4 class="callout-title">
                                <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.chain_invalid" />
                            </h4>
                            <p class="callout-body">
                                Hash chain verification failed. The audit log may have been tampered with.
                            </p>
                        </div>
                    </div>
                </div>

                <f:if condition="{errors}">
                    <div class="card mt-4">
                        <div class="card-header">
                            <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.verification_errors" />
                        </div>
                        <div class="card-body">
                            <ul class="list-group">
                                <f:for each="{errors}" as="error">
                                    <li class="list-group-item list-group-item-danger">
                                        <core:icon identifier="actions-exclamation-circle" size="small" />
                                        {error}
                                    </li>
                                </f:for>
                            </ul>
                        </div>
                    </div>
                </f:if>
            </f:else>
        </f:if>

        <div class="form-actions mt-4">
            <a href="{backUri}" class="btn btn-secondary">
                <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.back" />
            </a>
        </div>
    </div>
</f:section>

</html>
