<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Content">
    <h1><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:overview.title" /></h1>

    <p class="lead mb-4">
        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:overview.description" />
    </p>

    <!-- Statistics Cards -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">
                        <core:icon identifier="actions-lock" size="small" />
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:overview.secrets" />
                    </h5>
                    <p class="card-text display-4">{totalSecrets}</p>
                    <a href="{f:be.uri(route: 'admin_vault_secrets')}" class="btn btn-primary">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:overview.manage_secrets" />
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">
                        <core:icon identifier="actions-document-history-open" size="small" />
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:overview.audit_entries" />
                    </h5>
                    <p class="card-text display-4">{recentAuditCount}</p>
                    <a href="{f:be.uri(route: 'admin_vault_audit')}" class="btn btn-secondary">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:overview.view_audit" />
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Links -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">
                <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:overview.quick_actions" />
            </h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <a href="{f:be.uri(route: 'admin_vault_secrets', parameters: '{action: \'create\'}')}" class="btn btn-outline-primary w-100 mb-2">
                        <core:icon identifier="actions-plus" size="small" />
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:overview.create_secret" />
                    </a>
                </div>
                <div class="col-md-4">
                    <a href="{f:be.uri(route: 'admin_vault_migration')}" class="btn btn-outline-secondary w-100 mb-2">
                        <core:icon identifier="actions-database" size="small" />
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:overview.migration_wizard" />
                    </a>
                </div>
                <div class="col-md-4">
                    <a href="{f:be.uri(route: 'admin_vault_audit', parameters: '{action: \'verifyChain\'}')}" class="btn btn-outline-info w-100 mb-2">
                        <core:icon identifier="actions-shield-check" size="small" />
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:overview.verify_chain" />
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Usage Examples -->
    <div class="card mt-4">
        <div class="card-header">
            <h5 class="mb-0">
                <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:overview.usage" />
            </h5>
        </div>
        <div class="card-body">
            <h6><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:overview.usage.site_config" /></h6>
            <pre class="bg-light p-3 rounded"><code>settings:
  apiKey: '%vault(my-api-key)%'</code></pre>

            <h6 class="mt-3"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:overview.usage.php" /></h6>
            <pre class="bg-light p-3 rounded"><code>$vaultService = GeneralUtility::makeInstance(VaultServiceInterface::class);
$secret = $vaultService->retrieve('my-api-key');</code></pre>
        </div>
    </div>
</f:section>

</html>
