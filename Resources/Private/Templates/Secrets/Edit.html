<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Before">
    <f:asset.module identifier="@netresearch/nr-vault/SecretForm.js" />
</f:section>

<f:section name="Content">
    <h1><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.edit.title" /></h1>

        <form method="post" action="{f:be.uri(route: 'admin_vault_secrets.update', parameters: '{identifier: identifier}')}" class="vault-form" aria-labelledby="edit-secret-heading" autocomplete="off" data-form-type="other">
            <h2 id="edit-secret-heading" class="visually-hidden">
                <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.edit.title" />
            </h2>

            <div class="card card-size-medium mb-4">
                <div class="card-header">
                    <div class="card-header-body">
                        <h2 class="card-title"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.identifier" /></h2>
                        <span class="card-subtitle"><code>{identifier}</code></span>
                    </div>
                </div>
                <div class="card-body">
                    <p class="text-body-secondary mb-0">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.edit.info" />
                    </p>
                </div>
            </div>

            <fieldset class="form-section">
                <legend><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.edit.metadata" /></legend>

                <div class="form-group">
                    <label for="secret-description" class="form-label">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.description" />
                    </label>
                    <textarea id="secret-description"
                              name="description"
                              class="form-control"
                              rows="2"
                              aria-describedby="description-help">{metadata.description}</textarea>
                    <div id="description-help" class="form-text">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.description.help" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="secret-owner" class="form-label">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.owner" />
                    </label>
                    <select id="secret-owner"
                            name="owner"
                            class="form-select"
                            aria-describedby="owner-help">
                        <f:for each="{backendUsers}" as="user">
                            <option value="{user.uid}" selected="{f:if(condition: '{user.uid} == {metadata.owner_uid}', then: 'selected')}">
                                {user.username}<f:if condition="{user.realName}"> ({user.realName})</f:if>
                            </option>
                        </f:for>
                    </select>
                    <div id="owner-help" class="form-text">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.owner.help" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="secret-groups" class="form-label">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.groups" />
                    </label>
                    <select id="secret-groups"
                            name="groups[]"
                            class="form-select"
                            multiple
                            size="5"
                            aria-describedby="groups-help">
                        <f:for each="{backendGroups}" as="group">
                            <f:variable name="groupSelected" value="0" />
                            <f:if condition="{metadata.groups}">
                                <f:for each="{metadata.groups}" as="selectedGroup">
                                    <f:if condition="{selectedGroup} == {group.uid}">
                                        <f:variable name="groupSelected" value="1" />
                                    </f:if>
                                </f:for>
                            </f:if>
                            <option value="{group.uid}" selected="{f:if(condition: '{groupSelected}', then: 'selected')}">
                                {group.title}
                            </option>
                        </f:for>
                    </select>
                    <div id="groups-help" class="form-text">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.groups.edit.help" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="secret-context" class="form-label">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.context" />
                    </label>
                    <input type="text"
                           id="secret-context"
                           name="context"
                           class="form-control"
                           value="{metadata.context}"
                           placeholder="production"
                           aria-describedby="context-help" />
                    <div id="context-help" class="form-text">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.context.help" />
                    </div>
                </div>

                <div class="form-check form-group">
                    <input type="checkbox"
                           id="secret-frontend-accessible"
                           name="frontendAccessible"
                           class="form-check-input"
                           value="1"
                           {f:if(condition: metadata.frontend_accessible, then: 'checked')}
                           aria-describedby="frontend-accessible-help" />
                    <label for="secret-frontend-accessible" class="form-check-label">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.frontendAccessible" />
                    </label>
                    <div id="frontend-accessible-help" class="form-text">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.frontendAccessible.help" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="secret-expires" class="form-label">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.expiresAt" />
                    </label>
                    <input type="datetime-local"
                           id="secret-expires"
                           name="expiresAt"
                           class="form-control"
                           value="{f:if(condition: metadata.expires_at, then: '{metadata.expires_at -> f:format.date(format: \"Y-m-d\\TH:i\")}')}"
                           aria-describedby="expires-help" />
                    <div id="expires-help" class="form-text">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.expiresAt.help" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="secret-pid" class="form-label">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.pid" />
                    </label>
                    <div class="input-group">
                        <input type="number"
                               id="secret-pid"
                               name="scopePid"
                               class="form-control"
                               value="{metadata.scopePid}"
                               min="0"
                               aria-describedby="pid-help" />
                        <button type="button"
                                id="browse-page-btn"
                                class="btn btn-default"
                                title="Browse pages">
                            <core:icon identifier="actions-insert-record" size="small" />
                        </button>
                    </div>
                    <f:if condition="{metadata.scopePid}">
                        <span id="secret-pid-preview" class="form-text text-primary">Page {metadata.scopePid}</span>
                    </f:if>
                    <f:if condition="!{metadata.scopePid}">
                        <span id="secret-pid-preview" class="form-text text-primary d-none"></span>
                    </f:if>
                    <div id="pid-help" class="form-text">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.pid.help" />
                    </div>
                </div>
            </fieldset>

            <div class="form-actions mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <core:icon identifier="actions-check" size="small" />
                    <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.edit.submit" />
                </button>
                <f:be.link route="admin_vault_secrets" class="btn btn-default">
                    <core:icon identifier="actions-close" size="small" />
                    <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.edit.cancel" />
                </f:be.link>
            </div>
        </form>
</f:section>

</html>
