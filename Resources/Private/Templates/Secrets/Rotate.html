<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Before">
    <f:be.pageRenderer includeCssFiles="{0: 'EXT:nr_vault/Resources/Public/Css/backend.css'}" />
</f:section>

<f:section name="Content">
    <div class="vault-module" role="main" aria-label="Rotate Secret">
        <div class="callout callout-warning mb-4" role="alert">
            <div class="media">
                <div class="media-left" aria-hidden="true">
                    <core:icon identifier="actions-exclamation-triangle" size="small" />
                </div>
                <div class="media-body">
                    <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.rotate.warning" />
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.rotate.current" />
            </div>
            <div class="card-body">
                <dl class="row mb-0">
                    <dt class="col-sm-3"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.identifier" /></dt>
                    <dd class="col-sm-9"><code>{identifier}</code></dd>

                    <f:if condition="{metadata.description}">
                        <dt class="col-sm-3"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.description" /></dt>
                        <dd class="col-sm-9">{metadata.description}</dd>
                    </f:if>

                    <dt class="col-sm-3"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.owner" /></dt>
                    <dd class="col-sm-9">{metadata.owner_uid}</dd>

                    <dt class="col-sm-3"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.created" /></dt>
                    <dd class="col-sm-9">{metadata.crdate -> f:format.date(format: 'Y-m-d H:i:s')}</dd>

                    <dt class="col-sm-3"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.updated" /></dt>
                    <dd class="col-sm-9">{metadata.tstamp -> f:format.date(format: 'Y-m-d H:i:s')}</dd>

                    <dt class="col-sm-3"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.read_count" /></dt>
                    <dd class="col-sm-9">{metadata.read_count}</dd>
                </dl>
            </div>
        </div>

        <form method="post" action="{rotateUri}" class="vault-form" aria-labelledby="rotate-secret-heading" autocomplete="off" data-form-type="other">
            <h2 id="rotate-secret-heading" class="visually-hidden">
                <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.rotate.title" />
            </h2>

            <fieldset class="form-section">
                <legend><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.rotate.new" /></legend>

                <div class="form-group">
                    <label for="new-secret" class="form-label">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.secret" />
                        <span class="text-danger" aria-hidden="true">*</span>
                    </label>
                    <div class="input-group">
                        <input type="password"
                               id="new-secret"
                               name="secret"
                               class="form-control"
                               required
                               aria-required="true"
                               aria-describedby="secret-help"
                               autocomplete="off"
                               data-1p-ignore="true"
                               data-lpignore="true"
                               data-form-type="other" />
                        <button type="button"
                                class="btn btn-secondary"
                                onclick="toggleSecretVisibility(this)"
                                aria-label="Toggle secret visibility">
                            <core:icon identifier="actions-eye" size="small" />
                        </button>
                    </div>
                    <div id="secret-help" class="form-text">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.rotate.secret.help" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="rotate-reason" class="form-label">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.rotate.reason" />
                    </label>
                    <input type="text"
                           id="rotate-reason"
                           name="reason"
                           class="form-control"
                           placeholder="Scheduled rotation"
                           aria-describedby="reason-help" />
                    <div id="reason-help" class="form-text">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.rotate.reason.help" />
                    </div>
                </div>
            </fieldset>

            <div class="form-actions mt-4">
                <button type="submit" class="btn btn-warning">
                    <core:icon identifier="actions-refresh" size="small" />
                    <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.rotate.submit" />
                </button>
                <a href="{backUri}" class="btn btn-link">
                    <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.rotate.cancel" />
                </a>
            </div>
        </form>
    </div>

    <script>
        function toggleSecretVisibility(button) {
            var input = button.previousElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                button.setAttribute('aria-label', 'Hide secret');
            } else {
                input.type = 'password';
                button.setAttribute('aria-label', 'Show secret');
            }
        }
    </script>
</f:section>

</html>
