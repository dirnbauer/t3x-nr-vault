<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Content">
    <h1><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.title" /></h1>

    <!-- Filter Bar - TYPO3 v14 native form-row style -->
        <form method="post" action="{f:be.uri(route: 'admin_vault_secrets')}" role="search" aria-label="Filter secrets" class="mb-4">
            <div class="form-row">
                <div class="form-group">
                    <label for="filter-identifier" class="form-label">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.identifier" />
                    </label>
                    <input type="text"
                           class="form-control"
                           id="filter-identifier"
                           name="identifier"
                           value="{filters.identifier}"
                           placeholder="{f:translate(key: 'LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.filter.identifier.placeholder')}" />
                </div>
                <div class="form-group">
                    <label for="filter-status" class="form-label">
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.status" />
                    </label>
                    <select class="form-select" id="filter-status" name="status">
                        <option value=""{f:if(condition: '!{filters.status}', then: ' selected')}><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.filter.status.all" /></option>
                        <option value="active"{f:if(condition: '{filters.status} == \'active\'', then: ' selected')}>
                            <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.status.active" />
                        </option>
                        <option value="disabled"{f:if(condition: '{filters.status} == \'disabled\'', then: ' selected')}>
                            <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.status.disabled" />
                        </option>
                    </select>
                </div>
                <f:if condition="{ownerOptions}">
                    <div class="form-group">
                        <label for="filter-owner" class="form-label">
                            <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.owner" />
                        </label>
                        <select class="form-select" id="filter-owner" name="owner">
                            <option value="0"{f:if(condition: '!{filters.owner}', then: ' selected')}><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.filter.owner.all" /></option>
                            <f:for each="{ownerOptions}" as="ownerOption">
                                <option value="{ownerOption.uid}"{f:if(condition: '{filters.owner} == {ownerOption.uid}', then: ' selected')}>
                                    {ownerOption.name}
                                </option>
                            </f:for>
                        </select>
                    </div>
                </f:if>
                <div class="form-group">
                    <button type="submit" class="btn btn-default" name="operation" value="filter">
                        <core:icon identifier="actions-filter" size="small" />
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.filter.apply" />
                    </button>
                    <f:if condition="{filters.identifier} || {filters.status} || {filters.owner}">
                        <f:be.link route="admin_vault_secrets" class="btn btn-link" title="{f:translate(key: 'LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.filter.reset')}">
                            <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.filter.reset" />
                        </f:be.link>
                    </f:if>
                </div>
            </div>
        </form>

        <!-- Stats -->
        <div class="mb-3" role="status" aria-live="polite">
            <span class="badge text-bg-info" aria-label="{totalCount} secrets found">{totalCount} <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.filter.results" /></span>
        </div>

        <f:if condition="{secrets}">
            <f:then>
                <div class="table-fit" role="region" aria-label="Secrets list">
                    <table class="table table-striped table-hover" aria-describedby="secrets-table-description">
                        <caption id="secrets-table-description" class="visually-hidden">
                            List of stored secrets with their metadata and management actions
                        </caption>
                        <thead>
                            <tr>
                                <th scope="col"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.identifier" /></th>
                                <th scope="col"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.description" /></th>
                                <th scope="col"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.status" /></th>
                                <th scope="col"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.owner" /></th>
                                <th scope="col"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.created" /></th>
                                <th scope="col"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.read_count" /></th>
                                <th scope="col"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.last_read" /></th>
                                <th scope="col" class="col-control"><span class="visually-hidden"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.actions" /></span></th>
                            </tr>
                        </thead>
                        <tbody>
                            <f:for each="{secrets}" as="secret">
                                <tr class="{f:if(condition: secret.hidden, then: 'table-secondary')}">
                                    <td>
                                        <code aria-label="Secret identifier: {secret.identifier}">{secret.identifier}</code>
                                    </td>
                                    <td aria-label="Description: {secret.description}">
                                        <f:if condition="{secret.description}">
                                            <f:then>{secret.description}</f:then>
                                            <f:else><span class="text-body-secondary">-</span></f:else>
                                        </f:if>
                                    </td>
                                    <td aria-label="Status: {f:if(condition: secret.hidden, then: 'Disabled', else: 'Active')}">
                                        <f:if condition="{secret.hidden}">
                                            <f:then><span class="badge text-bg-secondary">Disabled</span></f:then>
                                            <f:else><span class="badge text-bg-success">Active</span></f:else>
                                        </f:if>
                                    </td>
                                    <td aria-label="Owner: {secret.owner_name}">{secret.owner_name}</td>
                                    <td aria-label="Created: {secret.created}">{secret.created}</td>
                                    <td aria-label="Read count: {secret.read_count}">{secret.read_count}</td>
                                    <td aria-label="Last read: {secret.last_read}">{secret.last_read}</td>
                                    <td class="col-control nowrap">
                                        <div class="btn-group" role="group" aria-label="Actions for {secret.identifier}">
                                            <f:be.link route="admin_vault_secrets.view" parameters="{identifier: secret.identifier}"
                                               class="btn btn-default"
                                               title="View details"
                                               aria-label="View details for {secret.identifier}">
                                                <core:icon identifier="actions-eye" size="small" />
                                            </f:be.link>
                                            <f:be.link route="admin_vault_secrets.edit" parameters="{identifier: secret.identifier}"
                                               class="btn btn-default"
                                               title="Edit secret"
                                               aria-label="Edit secret {secret.identifier}">
                                                <core:icon identifier="actions-open" size="small" />
                                            </f:be.link>
                                            <form method="post" action="{f:be.uri(route: 'admin_vault_secrets.toggle')}" class="d-inline" autocomplete="off">
                                                <input type="hidden" name="identifier" value="{secret.identifier}" />
                                                <button type="submit"
                                                        class="btn btn-default"
                                                        title="{f:if(condition: secret.hidden, then: 'Enable secret', else: 'Disable secret')}"
                                                        aria-label="{f:if(condition: secret.hidden, then: 'Enable', else: 'Disable')} secret {secret.identifier}">
                                                    <f:if condition="{secret.hidden}">
                                                        <f:then><core:icon identifier="actions-toggle-off" size="small" /></f:then>
                                                        <f:else><core:icon identifier="actions-toggle-on" size="small" /></f:else>
                                                    </f:if>
                                                </button>
                                            </form>
                                            <f:be.link route="admin_vault_secrets.rotate" parameters="{identifier: secret.identifier}"
                                               class="btn btn-default"
                                               title="Rotate secret"
                                               aria-label="Rotate secret {secret.identifier}">
                                                <core:icon identifier="actions-refresh" size="small" />
                                            </f:be.link>
                                            <form method="post" action="{f:be.uri(route: 'admin_vault_secrets.delete')}" class="d-inline" autocomplete="off">
                                                <input type="hidden" name="identifier" value="{secret.identifier}" />
                                                <button type="submit"
                                                        class="btn btn-default"
                                                        title="Delete secret"
                                                        aria-label="Delete secret {secret.identifier}"
                                                        onclick="return confirm('Are you sure you want to delete the secret \'{secret.identifier}\'? This action cannot be undone.');">
                                                    <core:icon identifier="actions-delete" size="small" />
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </f:for>
                        </tbody>
                    </table>
                </div>
            </f:then>
            <f:else>
                <f:be.infobox title="No Secrets Found" state="{f:constant(name: 'TYPO3\CMS\Core\Type\ContextualFeedbackSeverity::INFO')}">
                    <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.empty" />
                </f:be.infobox>
            </f:else>
        </f:if>
</f:section>

</html>
