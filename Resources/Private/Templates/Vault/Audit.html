<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Before">
    <f:be.pageRenderer includeCssFiles="{0: 'EXT:nr_vault/Resources/Public/Css/backend.css'}" />
</f:section>

<f:section name="Content">
    <div class="vault-module">
        <div class="vault-header">
            <h1>
                <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.title" />
            </h1>
            <div class="vault-actions">
                <a href="{f:uri.action(action: 'secrets')}" class="btn btn-default">
                    <core:icon identifier="actions-database" />
                    <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.title" />
                </a>
                <f:if condition="{isAdmin}">
                    <button type="button" class="btn btn-default t3js-vault-verify-chain">
                        <core:icon identifier="actions-check" />
                        <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.verify_chain" />
                    </button>
                    <div class="btn-group">
                        <button type="button" class="btn btn-default dropdown-toggle" data-bs-toggle="dropdown">
                            <core:icon identifier="actions-download" />
                            <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.export" />
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="{f:uri.action(action: 'export', arguments: '{format: \"json\"}')}">JSON</a></li>
                            <li><a class="dropdown-item" href="{f:uri.action(action: 'export', arguments: '{format: \"csv\"}')}">CSV</a></li>
                        </ul>
                    </div>
                </f:if>
            </div>
        </div>

        <div class="vault-filters">
            <form method="get" class="form-inline">
                <input type="hidden" name="action" value="audit" />
                <div class="form-group">
                    <label for="filter-secret">Secret:</label>
                    <input type="text" id="filter-secret" name="secretIdentifier" value="{filters.secretIdentifier}" class="form-control form-control-sm" placeholder="Secret identifier" />
                </div>
                <div class="form-group">
                    <label for="filter-action">Action:</label>
                    <select id="filter-action" name="action" class="form-select form-select-sm">
                        <option value="">All</option>
                        <f:for each="{actions}" as="action">
                            <option value="{action}" selected="{f:if(condition: '{filters.action} == {action}', then: 'selected')}">{action}</option>
                        </f:for>
                    </select>
                </div>
                <div class="form-group">
                    <label for="filter-since">Since:</label>
                    <input type="date" id="filter-since" name="since" value="{filters.since}" class="form-control form-control-sm" />
                </div>
                <div class="form-group">
                    <label for="filter-until">Until:</label>
                    <input type="date" id="filter-until" name="until" value="{filters.until}" class="form-control form-control-sm" />
                </div>
                <button type="submit" class="btn btn-primary btn-sm">
                    <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.filter" />
                </button>
            </form>
        </div>

        <div class="vault-stats">
            <span class="badge badge-info">{totalCount} entries</span>
            <span class="badge badge-secondary">Page {currentPage} of {totalPages}</span>
        </div>

        <f:if condition="{entries}">
            <f:then>
                <div class="table-fit">
                    <table class="table table-striped table-hover table-sm">
                        <thead>
                            <tr>
                                <th><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.timestamp" /></th>
                                <th><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.secret" /></th>
                                <th><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.action" /></th>
                                <th><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.success" /></th>
                                <th><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.actor" /></th>
                                <th><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.ip" /></th>
                                <th><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.hash" /></th>
                            </tr>
                        </thead>
                        <tbody>
                            <f:for each="{entries}" as="entry">
                                <tr class="{f:if(condition: entry.success, else: 'table-danger')}">
                                    <td><small>{entry.timestamp}</small></td>
                                    <td><code class="small">{entry.secretIdentifier}</code></td>
                                    <td>
                                        <span class="badge badge-{f:switch(expression: entry.action, cases: {create: 'success', read: 'info', update: 'warning', delete: 'danger', rotate: 'primary', access_denied: 'danger', default: 'secondary'})}">{entry.action}</span>
                                    </td>
                                    <td>
                                        <f:if condition="{entry.success}">
                                            <f:then><core:icon identifier="actions-check" size="small" /></f:then>
                                            <f:else><core:icon identifier="actions-close" size="small" /> <small class="text-danger">{entry.errorMessage}</small></f:else>
                                        </f:if>
                                    </td>
                                    <td>
                                        <small>{entry.actorUsername} ({entry.actorType})</small>
                                    </td>
                                    <td><small>{entry.ipAddress}</small></td>
                                    <td><code class="small">{entry.entryHash}</code></td>
                                </tr>
                            </f:for>
                        </tbody>
                    </table>
                </div>

                <f:if condition="{totalPages} > 1">
                    <nav aria-label="Pagination">
                        <ul class="pagination pagination-sm">
                            <f:if condition="{currentPage} > 1">
                                <li class="page-item">
                                    <a class="page-link" href="{f:uri.action(action: 'audit', arguments: '{page: 1}')}">First</a>
                                </li>
                                <li class="page-item">
                                    <a class="page-link" href="{f:uri.action(action: 'audit', arguments: '{page: currentPage - 1}')}">Previous</a>
                                </li>
                            </f:if>
                            <li class="page-item active">
                                <span class="page-link">{currentPage}</span>
                            </li>
                            <f:if condition="{currentPage} < {totalPages}">
                                <li class="page-item">
                                    <a class="page-link" href="{f:uri.action(action: 'audit', arguments: '{page: currentPage + 1}')}">Next</a>
                                </li>
                                <li class="page-item">
                                    <a class="page-link" href="{f:uri.action(action: 'audit', arguments: '{page: totalPages}')}">Last</a>
                                </li>
                            </f:if>
                        </ul>
                    </nav>
                </f:if>
            </f:then>
            <f:else>
                <div class="callout callout-info">
                    <div class="media">
                        <div class="media-left">
                            <core:icon identifier="actions-info" size="small" />
                        </div>
                        <div class="media-body">
                            <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.empty" />
                        </div>
                    </div>
                </div>
            </f:else>
        </f:if>
    </div>
</f:section>

</html>
