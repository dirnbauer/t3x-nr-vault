<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Before">
    <f:be.pageRenderer includeCssFiles="{0: 'EXT:nr_vault/Resources/Public/Css/backend.css'}" />
</f:section>

<f:section name="Content">
    <div class="vault-module" role="main" aria-label="Vault Secrets Management">
        <div class="vault-header">
            <h1 id="vault-page-title">
                <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.title" />
            </h1>
            <nav class="vault-actions" aria-label="Vault navigation">
                <a href="{f:uri.action(action: 'audit')}" class="btn btn-default" aria-label="View audit log">
                    <core:icon identifier="actions-document-history-open" />
                    <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.title" />
                </a>
            </nav>
        </div>

        <div class="vault-stats" role="status" aria-live="polite">
            <span class="badge badge-info" aria-label="{totalCount} secrets stored">{totalCount} secrets</span>
        </div>

        <f:if condition="{secrets}">
            <f:then>
                <div class="table-fit" role="region" aria-labelledby="vault-page-title">
                    <table class="table table-striped table-hover" aria-describedby="secrets-table-description">
                        <caption id="secrets-table-description" class="visually-hidden">
                            List of stored secrets with their metadata
                        </caption>
                        <thead>
                            <tr>
                                <th scope="col"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.identifier" /></th>
                                <th scope="col"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.owner" /></th>
                                <th scope="col"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.created" /></th>
                                <th scope="col"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.updated" /></th>
                                <th scope="col"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.read_count" /></th>
                                <th scope="col"><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.last_read" /></th>
                            </tr>
                        </thead>
                        <tbody>
                            <f:for each="{secrets}" as="secret">
                                <tr>
                                    <td>
                                        <code aria-label="Secret identifier: {secret.identifier}">{secret.identifier}</code>
                                    </td>
                                    <td aria-label="Owner user ID: {secret.owner_uid}">{secret.owner_uid}</td>
                                    <td aria-label="Created: {secret.created}">{secret.created}</td>
                                    <td aria-label="Updated: {secret.updated}">{secret.updated}</td>
                                    <td aria-label="Read count: {secret.read_count}">{secret.read_count}</td>
                                    <td aria-label="Last read: {secret.last_read}">{secret.last_read}</td>
                                </tr>
                            </f:for>
                        </tbody>
                    </table>
                </div>
            </f:then>
            <f:else>
                <div class="callout callout-info" role="alert" aria-live="polite">
                    <div class="media">
                        <div class="media-left" aria-hidden="true">
                            <core:icon identifier="actions-info" size="small" />
                        </div>
                        <div class="media-body">
                            <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.empty" />
                        </div>
                    </div>
                </div>
            </f:else>
        </f:if>
    </div>
</f:section>

</html>
