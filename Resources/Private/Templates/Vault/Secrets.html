<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Before">
    <f:be.pageRenderer includeCssFiles="{0: 'EXT:nr_vault/Resources/Public/Css/backend.css'}" />
</f:section>

<f:section name="Content">
    <div class="vault-module">
        <div class="vault-header">
            <h1>
                <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.title" />
            </h1>
            <div class="vault-actions">
                <a href="{f:uri.action(action: 'audit')}" class="btn btn-default">
                    <core:icon identifier="actions-document-history-open" />
                    <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:audit.title" />
                </a>
            </div>
        </div>

        <div class="vault-stats">
            <span class="badge badge-info">{totalCount} secrets</span>
        </div>

        <f:if condition="{secrets}">
            <f:then>
                <div class="table-fit">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.identifier" /></th>
                                <th><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.owner" /></th>
                                <th><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.created" /></th>
                                <th><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.updated" /></th>
                                <th><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.read_count" /></th>
                                <th><f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.last_read" /></th>
                            </tr>
                        </thead>
                        <tbody>
                            <f:for each="{secrets}" as="secret">
                                <tr>
                                    <td>
                                        <code>{secret.identifier}</code>
                                    </td>
                                    <td>{secret.owner_uid}</td>
                                    <td>{secret.created}</td>
                                    <td>{secret.updated}</td>
                                    <td>{secret.read_count}</td>
                                    <td>{secret.last_read}</td>
                                </tr>
                            </f:for>
                        </tbody>
                    </table>
                </div>
            </f:then>
            <f:else>
                <div class="callout callout-info">
                    <div class="media">
                        <div class="media-left">
                            <core:icon identifier="actions-info" size="small" />
                        </div>
                        <div class="media-body">
                            <f:translate key="LLL:EXT:nr_vault/Resources/Private/Language/locallang_mod.xlf:secrets.empty" />
                        </div>
                    </div>
                </div>
            </f:else>
        </f:if>
    </div>
</f:section>

</html>
